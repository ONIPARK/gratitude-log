<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<h2>Create Account</h2>

<div th:if="${param.success}">
    가입이 완료되었습니다!
</div>

<div th:if="${errorMessage}" th:text="${errorMessage}" style="color:#b00020;"></div>

<form th:action="@{/account/sign-up}" method="post" th:object="${form}">
    <div>
        <label>Email</label>
        <input th:field="*{email}" placeholder="email"/>
        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:#b00020;"></div>
    </div>

    <div>
        <label>Nickname</label>
        <input th:field="*{nickname}" placeholder="nickname"/>
        <div th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}" style="color:#b00020;"></div>
    </div>

    <div>
        <label>Password</label>
        <input type="password" th:field="*{password}" placeholder="password"/>
        <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:#b00020;"></div>
    </div>

    <button type="submit">Sign Up</button>
</form>
</body>
</html>
