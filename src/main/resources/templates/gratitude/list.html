<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <title>Title</title>
</head>
<body>
    <div class="layout">

        <!-- 左サイドバー -->
        <aside class="sidebar">
            <div class="brand">Gratitude</div>

            <nav class="menu">
                <p>
                    ようこそ、<span th:text="${nickname}">ニックネーム</span> さん
                </p>

                <form th:action="@{/logout}" method="post" class="menu-item">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="menu-link menu-button">
                        <span class="icon">🚪</span><span class="label">ログアウト</span>
                    </button>
                </form>

                <a class="menu-link" th:href="@{/}">
                    <span class="icon">🏠</span><span class="label">ホーム</span>
                </a>

                <!-- 検索 섹션 -->
                <div class="menu-block">
                    <div class="menu-link is-static">
                        <span class="icon">🔍</span><span class="label">検索</span>
                    </div>

                    <div class="search-mini">
                        <input type="text" id="searchKeyword" placeholder="検索キーワードを入力">
                        <div class="search-row">
                            <select id="sortOrder">
                                <option value="latest">最新順</option>
                                <option value="oldest">古い順</option>
                            </select>
                            <button type="button" id="btn-search">検索</button>
                        </div>
                    </div>
                </div>

                <!-- 作成 -->
                <div class="menu-block">
                    <form th:action="@{/gratitude/new}" method="get" class="menu-link">
                        <span class="icon">📝</span>
                        <button type="submit" class="link-btn"><span class="label">作成</span></button>
                    </form>
                </div>

            </nav>
        </aside>

        <!-- 右コンテンツ -->
        <main class="main">
            <!-- Toast -->
            <div id="toast"
                 th:if="${flashMessage != null}"
                 th:data-msg="${flashMessage}"
                 class="toast">
            </div>

            <ul id="itemList" class="feed">
                <li th:if="${#lists.isEmpty(items)}" class="empty">投稿された記事はありません。</li>

                <li th:each="it : ${items}" class="card">
                    <div class="card-body">
                        <strong class="title" th:text="${it.title}"></strong>
                        <p class="content" th:text="${it.content}"></p>
                    </div>

                    <div class="card-footer">
                        <small class="date" th:text="${#temporals.format(it.createdAt, 'yyyy.MM.dd')}"></small>

                        <div class="actions">
                            <form th:action="@{/gratitude/{id}/edit(id=${it.id})}" method="get">
                                <button type="submit" class="pill">修正</button>
                            </form>

                            <button type="button" class="pill btn-delete" th:attr="data-id=${it.id}">削除</button>
                        </div>
                    </div>
                </li>
            </ul>
        </main>

    </div>

<script>
    (function () {
      const toast = document.getElementById('toast');
      if (!toast) return;

      const msg = toast.dataset.msg || '';
      toast.textContent = msg;

      requestAnimationFrame(() => {
        toast.style.opacity = '1';
        toast.style.transform = 'translateY(0)';
      });

      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-10px)';
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    })();
</script>

<script th:src="@{/js/api.js}"></script>
</body>

    </html>
